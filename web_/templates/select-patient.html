{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Patient - Rehabilitation System</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        .select-page {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            position: relative;
            overflow: hidden;
        }
        
        .select-page::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.1"><circle cx="50" cy="50" r="40" stroke="white" stroke-width="2" fill="none"/><circle cx="50" cy="50" r="20" stroke="white" stroke-width="2" fill="none"/></svg>');
            background-repeat: repeat;
            animation: rotate 60s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .select-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 450px;
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 10;
        }
        
        .select-container h2 {
            color: #1e293b;
            font-size: 32px;
            margin-bottom: 30px;
        }
        
        .patients-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .patient-select-btn {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            text-align: left;
        }
        
        .patient-select-btn:hover {
            transform: translateY(-5px);
            border-color: #10b981;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.2);
        }
        
        .patient-avatar-large {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }
        
        .patient-info h3 {
            margin: 0 0 5px 0;
            color: #1e293b;
            font-size: 20px;
        }
        
        .patient-info p {
            margin: 0;
            color: #64748b;
            font-size: 14px;
        }
        
        .patient-level {
            margin-left: auto;
            background: #f1f5f9;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            color: #059669;
        }
        
        .btn-back {
            padding: 12px 30px;
            background: #f1f5f9;
            color: #475569;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn-back:hover {
            background: #e2e8f0;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="select-page">
        <div class="select-container">
            <h2>🎮 Select Player</h2>
            
            <div class="patients-list">
                <div class="patient-select-btn" onclick="selectPatient('PT001', 'Ali', 4)">
                    <div class="patient-avatar-large" style="background: linear-gradient(135deg, #4299e1, #63b3ed);">A</div>
                    <div class="patient-info">
                        <h3>Ali Ahmed</h3>
                        <p>8 years • Motor Disability</p>
                    </div>
                    <div class="patient-level">Level 4</div>
                </div>
                
                <div class="patient-select-btn" onclick="selectPatient('PT002', 'Sara', 3)">
                    <div class="patient-avatar-large" style="background: linear-gradient(135deg, #48bb78, #68d391);">S</div>
                    <div class="patient-info">
                        <h3>Sara Khaled</h3>
                        <p>7 years • Arm Weakness</p>
                    </div>
                    <div class="patient-level">Level 3</div>
                </div>
                
                <div class="patient-select-btn" onclick="selectPatient('PT003', 'Omar', 5)">
                    <div class="patient-avatar-large" style="background: linear-gradient(135deg, #ed8936, #f6ad55);">O</div>
                    <div class="patient-info">
                        <h3>Omar Hassan</h3>
                        <p>9 years • Movement Disorder</p>
                    </div>
                    <div class="patient-level">Level 5</div>
                </div>
            </div>
            
            <button class="btn-back" onclick="window.location.href='{% url 'index' %}'">
                <span>←</span> Back to Main Menu
            </button>
        </div>
    </div>
    
    <script src="{% static 'js/script.js' %}"></script>
    <script>
        function selectPatient(id, name, level) {
            localStorage.setItem('patientId', id);
            localStorage.setItem('patientName', name);
            localStorage.setItem('patientLevel', level);
            localStorage.setItem('userType', 'patient');
            window.location.href = "{% url 'patient_dashboard' %}";
        }
    </script>
</body>
</html>
