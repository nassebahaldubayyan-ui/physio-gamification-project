<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Doctor - Rehabilitation System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .chat-container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 25px 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .doctor-avatar-large {
            width: 60px;
            height: 60px;
            background: transparent;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: white;
            border: 2px solid white;
        }
        
        .chat-header-info h2 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .chat-header-info p {
            opacity: 0.9;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .online-dot {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        
        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 30px;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .message {
            display: flex;
            margin-bottom: 10px;
        }
        
        .message.doctor {
            justify-content: flex-start;
        }
        
        .message.patient {
            justify-content: flex-end;
        }
        
        .message-content {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
        }
        
        .message.doctor .message-content {
            background: white;
            color: #1e293b;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 5px;
        }
        
        .message.patient .message-content {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 5px;
        }
        
        .message-time {
            font-size: 11px;
            margin-top: 5px;
            opacity: 0.7;
        }
        
        .chat-input {
            padding: 20px 30px;
            background: white;
            border-top: 2px solid #f1f5f9;
            display: flex;
            gap: 15px;
        }
        
        .chat-input input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }
        
        .chat-input input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .chat-input button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .chat-input button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-back {
            margin: 20px 30px 30px;
            padding: 12px 30px;
            background: #f1f5f9;
            color: #475569;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn-back:hover {
            background: #e2e8f0;
            transform: translateY(-2px);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="doctor-avatar-large">
                <i class="fas fa-user-circle"></i>
            </div>
            <div class="chat-header-info">
                <h2>Dr. Ahmad</h2>
                <p><span class="online-dot"></span> Online</p>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="loading" id="loading">Loading messages...</div>
        </div>

        <div class="chat-input">
            <input type="text" placeholder="Type your message..." id="messageInput">
            <button onclick="sendMessage()" id="sendBtn">Send</button>
        </div>

        <button class="btn-back" onclick="goBack()">
            <span>←</span> Back to Dashboard
        </button>
    </div>

    <script>
        // Check if patient is logged in
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token || !user.id) {
            window.location.href = 'gamer-login.html';
        }

        const DOCTOR_ID = 1;
        let messages = [];

        document.addEventListener('DOMContentLoaded', function() {
            loadMessages();
        });

        function loadMessages() {
            document.getElementById('loading').style.display = 'block';
            
            setTimeout(() => {
                const mockMessages = [
                    { sender: 'doctor', text: 'Hello! How are you feeling today?', time: '10:30 AM' },
                    { sender: 'patient', text: 'I am feeling much better, thank you!', time: '10:32 AM' }
                ];
                renderMessages(mockMessages);
                document.getElementById('loading').style.display = 'none';
            }, 500);
        }

        function renderMessages(messagesArray) {
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.innerHTML = '';
            
            messagesArray.forEach(msg => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${msg.sender === 'patient' ? 'patient' : 'doctor'}`;
                messageDiv.innerHTML = `
                    <div class="message-content">
                        ${msg.text}
                        <div class="message-time">${msg.time}</div>
                    </div>
                `;
                chatMessages.appendChild(messageDiv);
            });
            
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            input.disabled = true;
            document.getElementById('sendBtn').disabled = true;
            
            const timeString = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message patient';
            messageDiv.innerHTML = `
                <div class="message-content">
                    ${message}
                    <div class="message-time">Just now</div>
                </div>
            `;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            input.value = '';
            
            setTimeout(() => {
                const replyDiv = document.createElement('div');
                replyDiv.className = 'message doctor';
                replyDiv.innerHTML = `
                    <div class="message-content">
                        Thank you for your message. I will get back to you soon.
                        <div class="message-time">${new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}</div>
                    </div>
                `;
                chatMessages.appendChild(replyDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
                
                input.disabled = false;
                document.getElementById('sendBtn').disabled = false;
                input.focus();
            }, 2000);
        }

        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        function goBack() {
            window.location.href = 'patient.html';
        }
    </script>
</body>
</html>
