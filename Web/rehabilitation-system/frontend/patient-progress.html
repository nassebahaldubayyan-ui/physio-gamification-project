<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Progress - Rehabilitation System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .progress-container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        
        h2 {
            color: #1e293b;
            font-size: 32px;
            margin-bottom: 30px;
        }
        
        .patient-info {
            background: #f8fafc;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border: 1px solid #e2e8f0;
        }
        
        .time-filter {
            display: flex;
            gap: 10px;
        }
        
        .filter-btn {
            padding: 8px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .filter-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-color: transparent;
        }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .chart-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border: 1px solid #e2e8f0;
        }
        
        .chart-card h3 {
            color: #1e293b;
            margin-bottom: 20px;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .chart-container {
            height: 300px;
            position: relative;
        }
        
        .current-stats {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .improvement {
            font-size: 12px;
            margin-top: 5px;
            color: #a5f3fc;
        }
        
        .btn-back {
            margin-top: 30px;
            padding: 12px 30px;
            background: #f1f5f9;
            color: #475569;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn-back:hover {
            background: #e2e8f0;
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            
            .current-stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="progress-container">
        <h2>📊 Patient Progress Dashboard</h2>
        
        <div class="patient-info">
            <div>
                <h3 id="patientName">Ali Ahmed</h3>
                <p id="patientId">PT001 • Right Hand Affected</p>
            </div>
            <div class="time-filter">
                <button class="filter-btn active" onclick="filterProgress('week')">Week</button>
                <button class="filter-btn" onclick="filterProgress('month')">Month</button>
                <button class="filter-btn" onclick="filterProgress('year')">Year</button>
            </div>
        </div>
        
        <div class="current-stats">
            <div class="stat-card">
                <div class="stat-value" id="shoulderStat">85%</div>
                <div class="stat-label">Shoulder</div>
                <div class="improvement" id="shoulderImpr">+5%</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="elbowStat">78%</div>
                <div class="stat-label">Elbow</div>
                <div class="improvement" id="elbowImpr">+3%</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="wristStat">82%</div>
                <div class="stat-label">Wrist</div>
                <div class="improvement" id="wristImpr">+4%</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="gripStat">79%</div>
                <div class="stat-label">Grip</div>
                <div class="improvement" id="gripImpr">+2%</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="rotationStat">92%</div>
                <div class="stat-label">Rotation</div>
                <div class="improvement" id="rotationImpr">+7%</div>
            </div>
        </div>
        
        <div class="charts-grid">
            <div class="chart-card">
                <h3><i class="fas fa-hand-paper"></i> Grip & Wrist Strength</h3>
                <div class="chart-container">
                    <canvas id="gripWristChart"></canvas>
                </div>
            </div>
            
            <div class="chart-card">
                <h3><i class="fas fa-hand"></i> Elbow Strength</h3>
                <div class="chart-container">
                    <canvas id="elbowChart"></canvas>
                </div>
            </div>
            
            <div class="chart-card">
                <h3><i class="fas fa-hand-rock"></i> Shoulder Strength</h3>
                <div class="chart-container">
                    <canvas id="shoulderChart"></canvas>
                </div>
            </div>
            
            <div class="chart-card">
                <h3><i class="fas fa-hand-spock"></i> External Rotation</h3>
                <div class="chart-container">
                    <canvas id="rotationChart"></canvas>
                </div>
            </div>
        </div>
        
        <div class="chart-card">
            <h3><i class="fas fa-chart-line"></i> Overall Progress</h3>
            <div class="chart-container" style="height: 400px;">
                <canvas id="overallChart"></canvas>
            </div>
        </div>
        
        <button class="btn-back" onclick="goBack()">
            <span>←</span> Back to Patient Details
        </button>
    </div>

    <script>
        let currentFilter = 'week';
        let charts = {};
        
        const urlParams = new URLSearchParams(window.location.search);
        const patientId = urlParams.get('patient') || 'PT001';
        const patientName = patientId === 'PT001' ? 'Ali Ahmed' : 
                           patientId === 'PT002' ? 'Sara Khaled' : 'Omar Hassan';
        
        document.getElementById('patientName').textContent = patientName;
        document.getElementById('patientId').textContent = patientId + ' • Right Hand Affected';
        
        // Sample data
        const progressData = {
            week: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                shoulder: [82, 83, 84, 84, 85, 86, 85],
                elbow: [75, 76, 77, 77, 78, 78, 78],
                wrist: [78, 79, 80, 81, 82, 82, 82],
                grip: [76, 77, 78, 78, 79, 79, 79],
                rotation: [88, 89, 90, 91, 92, 92, 92]
            },
            month: {
                labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'],
                shoulder: [80, 82, 84, 85],
                elbow: [72, 74, 76, 78],
                wrist: [75, 78, 80, 82],
                grip: [73, 75, 77, 79],
                rotation: [85, 88, 90, 92]
            },
            year: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                shoulder: [70, 73, 77, 80, 83, 85],
                elbow: [65, 68, 71, 74, 76, 78],
                wrist: [68, 71, 74, 77, 80, 82],
                grip: [66, 69, 72, 75, 77, 79],
                rotation: [75, 79, 83, 87, 90, 92]
            }
        };
        
        function initCharts() {
            charts.gripWrist = new Chart(document.getElementById('gripWristChart'), {
                type: 'line',
                data: {
                    labels: progressData.week.labels,
                    datasets: [{
                        label: 'Grip Strength',
                        data: progressData.week.grip,
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        tension: 0.4
                    }, {
                        label: 'Wrist Strength',
                        data: progressData.week.wrist,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
            
            charts.elbow = new Chart(document.getElementById('elbowChart'), {
                type: 'line',
                data: {
                    labels: progressData.week.labels,
                    datasets: [{
                        label: 'Elbow Strength',
                        data: progressData.week.elbow,
                        borderColor: '#f59e0b',
                        backgroundColor: 'rgba(245, 158, 11, 0.1)',
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
            
            charts.shoulder = new Chart(document.getElementById('shoulderChart'), {
                type: 'line',
                data: {
                    labels: progressData.week.labels,
                    datasets: [{
                        label: 'Shoulder Strength',
                        data: progressData.week.shoulder,
                        borderColor: '#8b5cf6',
                        backgroundColor: 'rgba(139, 92, 246, 0.1)',
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
            
            charts.rotation = new Chart(document.getElementById('rotationChart'), {
                type: 'line',
                data: {
                    labels: progressData.week.labels,
                    datasets: [{
                        label: 'External Rotation',
                        data: progressData.week.rotation,
                        borderColor: '#ec4899',
                        backgroundColor: 'rgba(236, 72, 153, 0.1)',
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
            
            charts.overall = new Chart(document.getElementById('overallChart'), {
                type: 'line',
                data: {
                    labels: progressData.week.labels,
                    datasets: [
                        { label: 'Shoulder', data: progressData.week.shoulder, borderColor: '#8b5cf6' },
                        { label: 'Elbow', data: progressData.week.elbow, borderColor: '#f59e0b' },
                        { label: 'Wrist', data: progressData.week.wrist, borderColor: '#3b82f6' },
                        { label: 'Grip', data: progressData.week.grip, borderColor: '#10b981' },
                        { label: 'Rotation', data: progressData.week.rotation, borderColor: '#ec4899' }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
            
            updateStats('week');
        }
        
        function filterProgress(filter) {
            currentFilter = filter;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            const data = progressData[filter];
            
            Object.values(charts).forEach(chart => {
                chart.data.labels = data.labels;
            });
            
            charts.gripWrist.data.datasets[0].data = data.grip;
            charts.gripWrist.data.datasets[1].data = data.wrist;
            charts.gripWrist.update();
            
            charts.elbow.data.datasets[0].data = data.elbow;
            charts.elbow.update();
            
            charts.shoulder.data.datasets[0].data = data.shoulder;
            charts.shoulder.update();
            
            charts.rotation.data.datasets[0].data = data.rotation;
            charts.rotation.update();
            
            charts.overall.data.datasets[0].data = data.shoulder;
            charts.overall.data.datasets[1].data = data.elbow;
            charts.overall.data.datasets[2].data = data.wrist;
            charts.overall.data.datasets[3].data = data.grip;
            charts.overall.data.datasets[4].data = data.rotation;
            charts.overall.update();
            
            updateStats(filter);
        }
        
        function updateStats(filter) {
            const data = progressData[filter];
            const lastIndex = data.labels.length - 1;
            
            document.getElementById('shoulderStat').textContent = data.shoulder[lastIndex] + '%';
            document.getElementById('elbowStat').textContent = data.elbow[lastIndex] + '%';
            document.getElementById('wristStat').textContent = data.wrist[lastIndex] + '%';
            document.getElementById('gripStat').textContent = data.grip[lastIndex] + '%';
            document.getElementById('rotationStat').textContent = data.rotation[lastIndex] + '%';
            
            if (lastIndex > 0) {
                document.getElementById('shoulderImpr').textContent = 
                    '+' + (data.shoulder[lastIndex] - data.shoulder[0]) + '%';
                document.getElementById('elbowImpr').textContent = 
                    '+' + (data.elbow[lastIndex] - data.elbow[0]) + '%';
                document.getElementById('wristImpr').textContent = 
                    '+' + (data.wrist[lastIndex] - data.wrist[0]) + '%';
                document.getElementById('gripImpr').textContent = 
                    '+' + (data.grip[lastIndex] - data.grip[0]) + '%';
                document.getElementById('rotationImpr').textContent = 
                    '+' + (data.rotation[lastIndex] - data.rotation[0]) + '%';
            }
        }
        
        function goBack() {
            window.location.href = `doctor-patient-details.html?patient=${patientId}`;
        }
        
        window.onload = initCharts;
    </script>
</body>
</html>
